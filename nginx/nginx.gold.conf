proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m;

upstream flask_app {
    least_conn;
    server app-1:5000;
    server app-2:5000;
    server app-3:5000;
    server app-4:5000;

    keepalive 64;
}

server {
    listen 80;

    # Increase client limits for load testing
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # Cache GET requests to API endpoints
    location ~ ^/(users|urls|events) {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        # Enable proxy caching for GET requests only
        set $no_cache 1;
        if ($request_method = GET) {
            set $no_cache 0;
        }

        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 30s;
        proxy_cache_key "$request_method$request_uri";
        proxy_no_cache $no_cache;
        proxy_cache_bypass $no_cache;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # All other routes (POST/PUT/DELETE, redirects, health, etc.)
    location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        # Buffering for better throughput
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }
}
