services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_tier3:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "synchronous_commit=off"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  app-1:
    build: .
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      SECRET_KEY: random_secret_key
      LOG_FILE_PATH: /app/logs/app-1.log
    volumes:
      - ./logs/app-1:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: always

  app-2:
    build: .
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      SECRET_KEY: random_secret_key
      LOG_FILE_PATH: /app/logs/app-2.log
    volumes:
      - ./logs/app-2:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: always

  app-3:
    build: .
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      SECRET_KEY: random_secret_key
      LOG_FILE_PATH: /app/logs/app-3.log
    volumes:
      - ./logs/app-3:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: always

  app-4:
    build: .
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      SECRET_KEY: random_secret_key
      LOG_FILE_PATH: /app/logs/app-4.log
    volumes:
      - ./logs/app-4:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.gold.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
      app-3:
        condition: service_healthy
      app-4:
        condition: service_healthy
    restart: always

volumes:
  postgres_data_tier3:
