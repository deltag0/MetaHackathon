receivers: # push based
  otlp:
    protocols:
      http:
        endpoint: localhost:4318 # Otel hosted endpoint
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 5s
          static_configs:
            - targets: [localhost:8888]
  
exporters: # pull based
  prometheus:
    endpoint: 0.0.0.0:8889 # prometheus will scrape from here
  debug:
    verbosity: detailed

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, memory_limiter]
      exporters: [prometheus]

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 4000
    spike_limit_mib: 500
  batch: