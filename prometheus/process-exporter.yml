process_names:
  - name: "server-python"
    cmdline:
      - '.*python(3(\.\d+)?)?.*(run\.py|gunicorn|flask).*'
      - '.*uv\s+run\s+run\.py.*'

  - name: "frontend"
    comm:
      - 'next-server (v'
      - 'next-server'

  - name: "database-postgres"
    cmdline:
      - '.*postgres.*'

  - name: "otel-collector"
    cmdline:
      - '.*otelcol.*'

  - name: "prometheus"
    cmdline:
      - '.*prometheus.*'

  - name: "grafana"
    cmdline:
      - '.*grafana.*'
