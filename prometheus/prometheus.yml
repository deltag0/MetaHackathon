global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090'] # Prometheus server default port

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel:8889'] # Common default for OTel Collector Prometheus exporter
    metrics_path: /metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics

  - job_name: 'process-exporter'
    static_configs:
      - targets: ['process-exporter:9256']
    metrics_path: /metrics
