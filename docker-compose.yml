name: url-shortner
services:
  # ── App infrastructure ──────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "synchronous_commit=off"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ── App instances (gold: 4 instances + nginx LB) ────────────────────
  app-1:
    build: .
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      SECRET_KEY: random_secret_key
      LOG_FILE_PATH: /app/logs/app-1.log
    volumes:
      - ./logs/app-1:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: always

  app-2:
    build: .
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      SECRET_KEY: random_secret_key
      LOG_FILE_PATH: /app/logs/app-2.log
    volumes:
      - ./logs/app-2:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: always

  app-3:
    build: .
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      SECRET_KEY: random_secret_key
      LOG_FILE_PATH: /app/logs/app-3.log
    volumes:
      - ./logs/app-3:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: always

  app-4:
    build: .
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      SECRET_KEY: random_secret_key
      LOG_FILE_PATH: /app/logs/app-4.log
    volumes:
      - ./logs/app-4:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.gold.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
      app-3:
        condition: service_healthy
      app-4:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"

  # ── Observability stack ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - 9090:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

  alertmanager:
    image: prom/alertmanager:latest
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sed -e "s|SMTP_SMARTHOST_VALUE|$$SMTP_SMARTHOST|g" \
            -e "s|SMTP_FROM_VALUE|$$SMTP_FROM|g" \
            -e "s|SMTP_AUTH_USERNAME_VALUE|$$SMTP_AUTH_USERNAME|g" \
            -e "s|SMTP_AUTH_PASSWORD_VALUE|$$SMTP_AUTH_PASSWORD|g" \
            -e "s|ALERT_EMAIL_TO_VALUE|$$ALERT_EMAIL_TO|g" \
            -e "s|ALERT_SMS_TO_VALUE|$$ALERT_SMS_TO|g" \
            /etc/alertmanager/alertmanager.tmpl.yml > /tmp/alertmanager.yml \
        && exec /bin/alertmanager --config.file=/tmp/alertmanager.yml
    environment:
      SMTP_SMARTHOST: ${SMTP_SMARTHOST}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_AUTH_USERNAME: ${SMTP_AUTH_USERNAME}
      SMTP_AUTH_PASSWORD: ${SMTP_AUTH_PASSWORD}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
      ALERT_SMS_TO: ${ALERT_SMS_TO}
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.tmpl.yml:ro
    ports:
      - 9093:9093

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - 9115:9115

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - --no-collector.kernel_hung
    ports:
      - 9100:9100

  process-exporter:
    image: ncabatoff/process-exporter:latest
    pid: host
    command:
      - --config.path
      - /etc/process-exporter/config.yml
    volumes:
      - ./prometheus/process-exporter.yml:/etc/process-exporter/config.yml:ro
    ports:
      - 9256:9256

  otel:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel/config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - 8889:8889
      - 4318:4318

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-data:/tmp

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
      - loki
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  grafana-data:
  postgres_data:
  loki-data:
  promtail-data:
