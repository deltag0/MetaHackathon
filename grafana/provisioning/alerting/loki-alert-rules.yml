apiVersion: 1

groups:
  - orgId: 1
    name: app-log-alerts
    folder: Observability
    interval: 1m
    rules:
      - uid: app-error-logs
        title: App Error Logs Detected
        condition: C
        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: 'sum(count_over_time({service="app"} |= "\"level\": \"ERROR\"" [5m]))'
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Application emitted error logs"
          description: "One or more ERROR level application logs detected in the past 5 minutes."
        labels:
          severity: warning
          source: loki

      - uid: high-error-rate
        title: High HTTP Error Rate
        condition: C
        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: |
                sum(count_over_time({service=~"app-.*"} |= "request_completed" | json | status_code >= 500 [5m]))
                /
                sum(count_over_time({service=~"app-.*"} |= "request_completed" [5m]))
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "High HTTP error rate detected"
          description: "More than 10% of HTTP requests are returning 5xx errors over the past 5 minutes."
        labels:
          severity: critical
          source: loki

      - uid: service-no-logs
        title: Service Not Producing Logs
        condition: C
        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: 'sum(count_over_time({service=~"app-.*"} [5m]))'
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 5m
        annotations:
          summary: "Service stopped producing logs"
          description: "No logs received from any app instance in the past 5 minutes. Service may be down."
        labels:
          severity: critical
          source: loki
